apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: voyager
spec:
  version: v0.1.0
  homepage: https://voyagermesh.com
  shortDescription: kubectl plugin for Voyager by AppsCode
  description: |
    This plugin provides a list of commands to interact with Voyager custom resources.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/voyagermesh/cli/releases/download/v0.1.0/kubectl-voyager-darwin-amd64.tar.gz
      sha256: e8a1b6dfa308c77de950cc57cdda0bc02faf1f7f1533cb7fb6a9a374a7b1faa8
      files:
        - from: "*"
          to: "."
      bin: kubectl-voyager-darwin-amd64
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/voyagermesh/cli/releases/download/v0.1.0/kubectl-voyager-darwin-arm64.tar.gz
      sha256: adf6acade447dfe3e51c7d2c6abbf75a24e8da22207d8d4c8b27e6912ff975bd
      files:
        - from: "*"
          to: "."
      bin: kubectl-voyager-darwin-arm64
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/voyagermesh/cli/releases/download/v0.1.0/kubectl-voyager-linux-amd64.tar.gz
      sha256: eaa6e7a4dbe853b3034109ee1ade5ef608e357f5549885b1e720150fd1db7b22
      files:
        - from: "*"
          to: "."
      bin: kubectl-voyager-linux-amd64
    - selector:
        matchLabels:
          os: linux
          arch: arm
      uri: https://github.com/voyagermesh/cli/releases/download/v0.1.0/kubectl-voyager-linux-arm.tar.gz
      sha256: 71992ae4b4dd0b629e60e3d9efd1e991e05b90b9a1900f72e1c9bff99b40435c
      files:
        - from: "*"
          to: "."
      bin: kubectl-voyager-linux-arm
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/voyagermesh/cli/releases/download/v0.1.0/kubectl-voyager-linux-arm64.tar.gz
      sha256: 0420ddc78027ed619fc48fb754c637f24bc5aeea66159b59659b0efbed8b89af
      files:
        - from: "*"
          to: "."
      bin: kubectl-voyager-linux-arm64
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/voyagermesh/cli/releases/download/v0.1.0/kubectl-voyager-windows-amd64.zip
      sha256: ebb97cc90b2eadb09d8f8932bff56014c3c3767daf7a8cf8be5a4c2a01656896
      files:
        - from: "*"
          to: "."
      bin: kubectl-voyager-windows-amd64.exe
